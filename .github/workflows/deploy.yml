name: Laravel Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  # --- JOB 1: BUILD ---
  build_app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      
      - name: Install Dependencies
        run: composer install --no-ansi --no-interaction --prefer-dist

      - name: Archive Production Artifact
        uses: actions/upload-artifact@v4
        with:
          name: laravel-app-bundle
          path: .  # Uploads everything including the new 'vendor' folder

  # --- JOB 2: DEPLOY TO STAGING ---
  deploy_staging:
    needs: build_app
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: laravel-app-bundle

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Staging Slot
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'laravel-webapp-linux'
          slot-name: 'laravel-app-staging'
          package: .

      # - name: Run Staging Migrations
      #   run: |
      #     az webapp ssh \
      #       --resource-group app-service-rg\
      #       --name laravel-webapp-linux \
      #       --slot laravel-app-staging \
      #       --command "php artisan migrate --force"
        
  # --- JOB 3: SWAP TO PRODUCTION (Approval Required) ---
  promote_to_production:
    needs: deploy_staging
    runs-on: ubuntu-latest
    environment: 'Production'
    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Swap Slots
        run: |
          az webapp deployment slot swap \
            --resource-group app-service-rg\
            --name laravel-webapp-linux \
            --slot laravel-app-staging \
            --target-slot production